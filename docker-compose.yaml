version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: postgres_container
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: matricula
    ports:
      - "5432:5432"
    volumes:
      - ./volume:/var/lib/postgresql/data
    networks:
      - pg_network

networks:
  pg_network:
    driver: bridge

